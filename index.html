<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sistema PRO Operador Trainee Multi-Equipo</title>
<style>
:root{--bg:#07121f;--panel:#0e1b2d;--card:#13233a;--ink:#eef6ff;--muted:#9fb3c8;--line:#24415f;--brand:#16d0b5;--brand2:#ffc857;--bad:#ff5b6e;--ok:#42d392;--warn:#ffc857}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#06101d,#0b1b2f 45%,#07121f);color:var(--ink)}header{padding:22px 18px;border-bottom:1px solid var(--line);background:rgba(5,12,24,.82);position:sticky;top:0;z-index:5;backdrop-filter:blur(12px)}.top{display:flex;gap:16px;align-items:center;justify-content:space-between;max-width:1280px;margin:auto}.brand{display:flex;gap:13px;align-items:center}.logo{width:48px;height:48px;border-radius:15px;background:linear-gradient(135deg,var(--brand),#1c75bc);display:grid;place-items:center;font-weight:900;color:#06101d;box-shadow:0 14px 30px rgba(22,208,181,.25)}h1{font-size:20px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:3px}.actions{display:flex;gap:8px;flex-wrap:wrap}button,.btn{border:0;border-radius:12px;padding:10px 13px;font-weight:800;cursor:pointer;color:#05111e;background:var(--brand)}button.secondary{background:#203a58;color:var(--ink);border:1px solid var(--line)}button.warn{background:var(--brand2)}button.danger{background:var(--bad);color:white}main{max-width:1280px;margin:0 auto;padding:18px}.grid{display:grid;grid-template-columns:290px 1fr;gap:16px}.side{background:rgba(14,27,45,.88);border:1px solid var(--line);border-radius:20px;padding:14px;height:max-content;position:sticky;top:102px}.content{min-width:0}.card{background:rgba(19,35,58,.94);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 18px 44px rgba(0,0,0,.22);margin-bottom:16px}.tabs{display:grid;gap:8px}.tab{padding:12px;border-radius:14px;border:1px solid transparent;background:#0c1829;color:var(--ink);text-align:left}.tab.active{background:linear-gradient(135deg,rgba(22,208,181,.22),rgba(28,117,188,.20));border-color:var(--brand)}label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:9px 0 5px;text-transform:uppercase;letter-spacing:.04em}input,select,textarea{width:100%;padding:10px 11px;border-radius:12px;border:1px solid var(--line);background:#081422;color:var(--ink);outline:none}textarea{min-height:76px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{background:#0b1728;border:1px solid var(--line);border-radius:17px;padding:14px}.kpi b{font-size:26px}.kpi span{display:block;color:var(--muted);font-size:12px;margin-top:4px}table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:14px;border:1px solid var(--line)}th,td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}th{background:#0a1728;color:#bfefff;text-align:left}tr:last-child td{border-bottom:0}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#091829;border-radius:99px;padding:6px 9px;color:var(--muted);font-size:12px}.status-ok{color:var(--ok)}.status-warn{color:var(--warn)}.status-bad{color:var(--bad)}.hidden{display:none!important}.scoregrid{display:grid;grid-template-columns:1.2fr 1fr 110px;gap:9px;align-items:center;border-bottom:1px solid var(--line);padding:10px 0}.scoregrid small{color:var(--muted)}.footer-note{font-size:12px;color:var(--muted)}@media(max-width:900px){.grid{grid-template-columns:1fr}.side{position:relative;top:auto}.row,.row3,.kpis{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.actions{width:100%}button{flex:1}.scoregrid{grid-template-columns:1fr}}@media print{header,.side,.no-print{display:none!important}body{background:white;color:#111}main{padding:0}.grid{display:block}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid;background:white;color:#111}th{background:#eee;color:#111}td,th{border-color:#ddd}.pill,input,select,textarea{color:#111;background:white;border-color:#aaa}}
</style>
</head><body>
<header><div class="top"><div class="brand"><div class="logo">OT</div><div><h1>Sistema PRO Operador Trainee Multi-Equipo</h1><div class="sub">Matriz de formación · Observación en terreno · Evaluación final · Cierre de brechas</div></div></div><div class="actions"><button onclick="saveAll()">Guardar</button><button class="secondary" onclick="exportJSON()">Exportar respaldo</button><button class="warn" onclick="window.print()">Imprimir / PDF</button></div></div></header>
<main><div class="grid"><aside class="side"><label>Equipo</label><select id="equipo" onchange="renderAll()"></select><label>Operador</label><input id="operador" placeholder="Nombre operador trainee" oninput="saveAll(false)"><label>RUN</label><input id="run" placeholder="12.345.678-9" oninput="saveAll(false)"><label>Instructor</label><input id="instructor" placeholder="Instructor / Operador senior" oninput="saveAll(false)"><label>Turno</label><select id="turno" onchange="saveAll(false)"><option>A</option><option>B</option><option>Día</option><option>Noche</option></select><label>Fecha</label><input type="date" id="fecha" onchange="saveAll(false)"><hr style="border-color:var(--line);border-style:solid;border-width:1px 0 0;margin:14px 0"><div class="tabs no-print"><button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button><button class="tab" onclick="showTab('plan',this)">Plan modular</button><button class="tab" onclick="showTab('pauta',this)">Pauta observación</button><button class="tab" onclick="showTab('eval',this)">Evaluación final</button><button class="tab" onclick="showTab('brechas',this)">Brechas y acciones</button></div></aside><section class="content">
<div id="dashboard" class="view"></div><div id="plan" class="view hidden"></div><div id="pauta" class="view hidden"></div><div id="eval" class="view hidden"></div><div id="brechas" class="view hidden"></div>
</section></div></main>
<script>
const EQUIPOS=[
{e:'Jumbo S1D',f:'Perforación frontal',mod:'Perforación de avance / frente',foco:'Posicionamiento, lectura de diagrama, perforación y aceros',riesgo:'Interacción equipo-persona, caída de roca, energía hidráulica/eléctrica'},
{e:'Boomer S2C',f:'Perforación frontal',mod:'Perforación de avance / desarrollo',foco:'Doble brazo, navegación, paralelismo y calidad de tiro',riesgo:'Interacción equipo-persona, proyección de partículas, energía acumulada'},
{e:'Simba S7D',f:'Perforación radial',mod:'Perforación radial / producción',foco:'Instalación, orientación de abanicos, divergencia y perforación larga',riesgo:'Caída distinto nivel, atrapamiento, presión agua/aire'},
{e:'Boltec M',f:'Fortificación mecanizada',mod:'Pernos, malla, lechado y resina',foco:'Posicionamiento, perforación, instalación de pernos, torque y sostenimiento',riesgo:'Caída de roca, atrapamiento, energía hidráulica, trabajo bajo techo'},
{e:'Scoop ST1030',f:'Carguío y transporte',mod:'LHD / carguío interior mina',foco:'Inspección, conducción, carguío, descarga e interacción con tránsito',riesgo:'Colisión, atropello, incendio, visibilidad reducida'},
{e:'Mixer Tornado S2',f:'Transporte hormigón',mod:'Mezclador / shotcrete logística',foco:'Carga, traslado, descarga, lavado y control de aditivos',riesgo:'Atropello, atrapamiento, exposición a cemento/aditivos'},
{e:'Roboshot Alpha 30',f:'Shotcrete',mod:'Proyección de hormigón',foco:'Preparación, proyección, distancia, ángulo, espesor y limpieza',riesgo:'Proyección de material, caída de roca, polvo/aditivos'},
{e:'Manipulador JCB 533-105',f:'Levante',mod:'Manipulador telescópico',foco:'Tabla de carga, estabilización, traslado e izaje de materiales',riesgo:'Volcamiento, caída de carga, interacción, líneas de energía'},
{e:'Retroexcavadora JCB 3CX',f:'Movimiento tierra',mod:'Retroexcavadora / apoyo obras',foco:'Inspección, excavación, desplazamiento y trabajo superficie/interior',riesgo:'Atrapamiento, golpeado por, volcamiento'},
{e:'Sandvik DD311D/DD321D',f:'Perforación frontal',mod:'Perforación avance / desarrollo',foco:'Inspección, posicionamiento, perforación y control de parámetros',riesgo:'Interacción, energía hidráulica, caída de roca'}];
const MODULOS=[['1','Inducción minería subterránea y normativa','8','Comprende entorno operacional, normativa interna, SSOMA y rol del trainee.','Prueba teórica + asistencia','10%'],['2','Geología, geomecánica y sostenimiento','8','Reconoce condiciones de roca y controles previos a operar.','Caso aplicado + observación','10%'],['3','Mecánica básica, preuso y mantenimiento preventivo','12','Ejecuta inspección preoperacional y detecta condiciones subestándar.','Checklist preuso','15%'],['4','Operación específica por equipo','24','Opera bajo supervisión con control de parámetros y calidad.','Pauta práctica','35%'],['5','Control crítico y gestión de riesgos','8','Aplica controles críticos antes, durante y después de la tarea.','Observación conductual','15%'],['6','Evaluación final y cierre de brechas','8','Determina aptitud operacional y plan de reentrenamiento.','Informe final','15%']];
const CRITERIOS=['Inspección del terreno','Preuso del equipo','Seguridad operacional','Desplazamiento','Posicionamiento','Operación específica','Control de calidad','Cierre de turno'];
const DESC=['Reconoce condiciones geomecánicas, caída de roca, agua, gases y segregación.','Verifica niveles, fugas, neumáticos/orugas, luces, extintor, bocina y sistemas críticos.','Aplica autorización, comunicación radial, bocina, bloqueo/aislación y control de entorno.','Desplaza el equipo respetando postura, velocidad, visibilidad y segregación.','Posiciona equipo según diagrama, área segura y estándares de calidad.','Ejecuta ciclo de trabajo del equipo seleccionado con parámetros correctos.','Verifica resultado: perforación, fortificación, carguío, proyección, levante o traslado.','Reporta novedades, horómetros, daños, repuestos y condición final del equipo.'];
let data=JSON.parse(localStorage.getItem('traineePro')||'{}');
function init(){equipo.innerHTML=EQUIPOS.map(x=>`<option>${x.e}</option>`).join(''); fecha.valueAsDate=new Date(); ['operador','run','instructor','turno','fecha','equipo'].forEach(id=>{if(data[id]) document.getElementById(id).value=data[id]}); renderAll();} init();
function showTab(id,btn){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');}
function saveAll(toast=true){['operador','run','instructor','turno','fecha','equipo'].forEach(id=>data[id]=document.getElementById(id).value); localStorage.setItem('traineePro',JSON.stringify(data)); renderDashboard(); if(toast) alert('Registro guardado en este dispositivo.');}
function getScores(){return CRITERIOS.map((_,i)=>Number(data['c'+i]||0));} function avg(){let a=getScores(); return Math.round((a.reduce((x,y)=>x+y,0)/(a.length*4))*100)||0} function theoretical(){return Number(data.teorica||0)} function attendance(){return Number(data.asistencia||0)} function estado(){let p=avg(),t=theoretical(),a=attendance(); if(p>=85&&t>=5&&a>=90)return ['APTO','status-ok']; if(p>=75&&t>=4&&a>=80)return ['APTO CON OBSERVACIONES','status-warn']; return ['NO APTO / REENTRENAR','status-bad'];}
function renderAll(){saveAll(false); renderDashboard(); renderPlan(); renderPauta(); renderEval(); renderBrechas();}
function selected(){return EQUIPOS.find(x=>x.e===equipo.value)||EQUIPOS[0]}
function renderDashboard(){let x=selected(), st=estado(); dashboard.innerHTML=`<div class="card"><span class="pill">${x.f}</span><h2>${x.e} · ${x.mod}</h2><p class="sub">Foco operacional: ${x.foco}</p><p class="sub">Riesgos críticos: ${x.riesgo}</p><div class="kpis"><div class="kpi"><b>${attendance()}%</b><span>Asistencia</span></div><div class="kpi"><b>${theoretical().toFixed(1)}</b><span>Nota teórica</span></div><div class="kpi"><b>${avg()}%</b><span>Cumplimiento práctico</span></div><div class="kpi"><b class="${st[1]}">${st[0]}</b><span>Resultado final</span></div></div></div><div class="card"><h3>Datos del registro</h3><table><tr><th>Operador</th><td>${operador.value||'Sin completar'}</td><th>RUN</th><td>${run.value||'Sin completar'}</td></tr><tr><th>Instructor</th><td>${instructor.value||'Sin completar'}</td><th>Fecha / Turno</th><td>${fecha.value||''} · ${turno.value}</td></tr></table></div>`}
function renderPlan(){plan.innerHTML=`<div class="card"><h2>Plan modular base para todos los equipos</h2><table><thead><tr><th>Mód.</th><th>Nombre</th><th>Horas</th><th>Resultado esperado</th><th>Evaluación</th><th>Peso</th></tr></thead><tbody>${MODULOS.map(m=>`<tr><td>${m[0]}</td><td>${m[1]}</td><td>${m[2]}</td><td>${m[3]}</td><td>${m[4]}</td><td>${m[5]}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Módulo específico seleccionado</h3><p><b>${selected().mod}:</b> ${selected().foco}</p><p class="footer-note">Este módulo se adapta al equipo seleccionado, manteniendo el mismo estándar de aprobación: asistencia ≥90%, nota teórica ≥5,0 y práctica ≥85%.</p></div>`}
function renderPauta(){pauta.innerHTML=`<div class="card"><h2>Pauta de observación en terreno</h2>${CRITERIOS.map((c,i)=>`<div class="scoregrid"><div><b>${i+1}. ${c}</b><br><small>${DESC[i]}</small></div><select onchange="data['c${i}']=this.value; saveAll(false); renderAll()"><option value="0">Sin evaluar</option><option value="1" ${data['c'+i]==1?'selected':''}>1 · Deficiente</option><option value="2" ${data['c'+i]==2?'selected':''}>2 · Básico</option><option value="3" ${data['c'+i]==3?'selected':''}>3 · Competente</option><option value="4" ${data['c'+i]==4?'selected':''}>4 · Autónomo</option></select><span class="pill">${Math.round((Number(data['c'+i]||0)/4)*100)}%</span></div>`).join('')}</div>`}
function renderEval(){eval.innerHTML=`<div class="card"><h2>Evaluación final</h2><div class="row3"><div><label>% asistencia</label><input type="number" min="0" max="100" id="asistencia" value="${data.asistencia||''}" oninput="data.asistencia=this.value;saveAll(false);renderAll()"></div><div><label>Nota teórica</label><input type="number" step="0.1" min="1" max="7" id="teorica" value="${data.teorica||''}" oninput="data.teorica=this.value;saveAll(false);renderAll()"></div><div><label>Estado equipo</label><select onchange="data.estadoEquipo=this.value;saveAll(false)"><option>Operativo</option><option>Disponible</option><option>En mantenimiento</option><option>Puesta en marcha</option><option>F/S</option><option>Condicionado</option></select></div></div><label>Observaciones del instructor</label><textarea oninput="data.obs=this.value;saveAll(false)" placeholder="Fortalezas, brechas, restricciones y recomendación de liberación operacional.">${data.obs||''}</textarea></div>`}
function renderBrechas(){let bajas=CRITERIOS.map((c,i)=>({c,v:Number(data['c'+i]||0)})).filter(x=>x.v<3); brechas.innerHTML=`<div class="card"><h2>Plan de cierre de brechas</h2><table><thead><tr><th>Brecha detectada</th><th>Acción recomendada</th><th>Responsable</th><th>Plazo</th></tr></thead><tbody>${(bajas.length?bajas:[{c:'Sin brechas críticas registradas',v:4}]).map(b=>`<tr><td>${b.c}</td><td>${b.v<3?'Reentrenamiento práctico dirigido, observación en terreno y reevaluación.':'Mantener seguimiento preventivo.'}</td><td>Instructor / Jefatura directa</td><td>24 a 72 horas</td></tr>`).join('')}</tbody></table><p class="footer-note">No liberar operador si mantiene controles críticos bajo nivel 3 o incumple asistencia/nota mínima.</p></div>`}
function exportJSON(){saveAll(false);const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='respaldo_operador_trainee.json';a.click();}
</script></body></html>
